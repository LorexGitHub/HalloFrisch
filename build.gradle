plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'

    // Plugin that makes it easy to work with JavaFX.
    id 'org.openjfx.javafxplugin' version '0.1.0'

    // The JaCoCo plugin provides code coverage metrics for Java code via integration with JaCoCo.
    id 'jacoco'

    // The Eclipse plugins generate files that are used by the Eclipse IDE, thus making it possible to import the project into Eclipse.
    id 'eclipse'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.3'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // Use XStream to serialize Java objects.
    // https://x-stream.github.io/
    //implementation 'com.thoughtworks.xstream:xstream:1.4.20'

    // Use the OrmLite object relational mapper.
    // https://ormlite.com/
    //implementation 'com.j256.ormlite:ormlite-core:6.1'
    //implementation 'com.j256.ormlite:ormlite-jdbc:6.1'

    // Use the Apache Log4j logging framework.
    // https://logging.apache.org/log4j/2.x/
    //implementation 'org.apache.logging.log4j:log4j-api:2.24.1'
    //implementation 'org.apache.logging.log4j:log4j-core:2.24.1'
}

java {
    toolchain {
        // Apply a specific Java toolchain to ease working on different environments.
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'de.unims.sopra25.App'
}

javafx {
    // Specify the JavaFX modules used by the project.
    modules = ['javafx.controls']

    // Specify the JavaFX version.
    version = "21"
}

run {
    // Enable assertions when starting via Gradle.
    enableAssertions = true
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()

    // Enable assertions during testing.
    enableAssertions = true
}

jacocoTestReport {
    dependsOn test

    // Generate a Jacoco test report (.csv).
    reports {
        csv.required = true
    }
}

task coverageTotal {
    group "Verification"
    description "Produce the percentage for covered lines for Gitlab."
    dependsOn jacocoTestReport

    doLast {
        if (jacocoTestReport.reports.csv.outputLocation.isPresent()) {
            def missed = 0
            def covered = 0
            jacocoTestReport.reports.csv.outputLocation.get().getAsFile().eachLine { line ->
                def cols = line.split(',')
                def miss = cols[3]
                def cov = cols[4]
                assert miss == 'INSTRUCTION_MISSED' && cov == 'INSTRUCTION_COVERED' ||
                    miss.isInteger() && cov.isInteger() :
                    'Invalid jacoco CSV report'
                if (miss.isInteger()) {
                    missed += miss as Integer
                    covered += cov as Integer
                }
            }
            if (missed + covered > 0)
                printf '%.2f%% covered%n', covered / (missed + covered) * 100
            else
                println '100% covered'
        }
        else
            logger.warn('No jacoco coverage csv found.')
    }
}

javadoc {
    options.encoding = 'UTF-8'
    options.charSet = 'UTF-8'
    options.docEncoding = 'UTF-8'

    // Define pre/post/inv tags.
    options.tags = [
        'pre:cm:Preconditions:',
        'post:cm:Postconditions:',
        'inv:t:Invariants:'
    ]
}
